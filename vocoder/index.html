<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gesture Vocoder</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <header>
        <h1>Gesture Vocoder</h1>
        <p class="subtitle">Hand-controlled voice synthesizer · right: pitch (y) + clean monitor (pinch) · left: triad density (openness) · two-hand distance: reverb</p>
      </header>

      <section class="stage">
        <!-- Video element receives the raw camera feed. It's hidden visually
             (we draw it into the canvas), but kept in the DOM because
             MediaPipe's HandLandmarker reads frames directly from it. -->
        <video id="video" playsinline autoplay muted></video>
        <!-- Canvas overlay: we paint the camera frame here (mirrored) and
             then draw the 21-point hand landmarks on top. -->
        <canvas id="overlay"></canvas>
      </section>

      <section class="controls">
        <div class="control-row primary-row">
          <button id="start-btn" type="button">Start</button>
          <button id="record-btn" type="button" disabled>● Record</button>
          <span id="record-timer" class="record-timer hidden">● 0:00</span>
          <div id="status" class="status">Click <strong>Start</strong> to grant camera + mic access.</div>
        </div>

        <div class="control-row pickers">
          <label class="picker">
            <span class="picker-label">Scale</span>
            <select id="scale-name">
              <option value="chromatic">Chromatic</option>
              <option value="major">Major</option>
              <option value="minor">Minor</option>
              <option value="pentatonicMajor">Pentatonic Major</option>
              <option value="pentatonicMinor" selected>Pentatonic Minor</option>
              <option value="dorian">Dorian</option>
              <option value="mixolydian">Mixolydian</option>
            </select>
          </label>
          <label class="picker">
            <span class="picker-label">Key</span>
            <select id="scale-root">
              <option value="0" selected>C</option>
              <option value="1">C♯ / D♭</option>
              <option value="2">D</option>
              <option value="3">D♯ / E♭</option>
              <option value="4">E</option>
              <option value="5">F</option>
              <option value="6">F♯ / G♭</option>
              <option value="7">G</option>
              <option value="8">G♯ / A♭</option>
              <option value="9">A</option>
              <option value="10">A♯ / B♭</option>
              <option value="11">B</option>
            </select>
          </label>
        </div>

        <div class="meters">
          <div class="meter">
            <div class="meter-label">Mode</div>
            <div id="meter-gate" class="meter-value off">silent</div>
          </div>
          <div class="meter">
            <div class="meter-label">Note</div>
            <div id="meter-note" class="meter-value">—</div>
          </div>
          <div class="meter">
            <div class="meter-label">Chord</div>
            <div id="meter-chord" class="meter-value">—</div>
          </div>
          <div class="meter">
            <div class="meter-label">Density</div>
            <div class="bar"><div id="meter-wet" class="bar-fill"></div></div>
          </div>
          <div class="meter">
            <div class="meter-label">Reverb</div>
            <div class="bar"><div id="meter-reverb" class="bar-fill"></div></div>
          </div>
          <div class="meter">
            <div class="meter-label">Tremolo</div>
            <div class="bar"><div id="meter-tremolo" class="bar-fill"></div></div>
          </div>
        </div>

        <details class="debug-wrap">
          <summary>Debug info</summary>
          <pre id="debug" class="debug"></pre>
        </details>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
